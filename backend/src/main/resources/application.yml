# ─────────────────────────────────────────────────────────────────────────────
# CodeSage AI — Base Application Configuration
# Shared by ALL profiles (dev, prod). Profile-specific files override these.
# Architecture Spec: Environment-based configuration, no hardcoded secrets.
# ─────────────────────────────────────────────────────────────────────────────

spring:
  application:
    name: codesage

  # Active profile — override via SPRING_PROFILES_ACTIVE env var
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Safety net: explicitly exclude Gemini auto-configuration.
  # If the Gemini JAR is absent these are no-ops; if somehow present,
  # this prevents GoogleAiEmbeddingModel from overriding our Ollama beans.
  autoconfigure:
    exclude:
      - dev.langchain4j.autoconfigure.models.google.GoogleAiGeminiAutoConfiguration
      - dev.langchain4j.autoconfigure.models.google.GoogleAiEmbeddingModelAutoConfiguration

  # ─── Jackson ───────────────────────────────────────────────────────────────
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
      indent-output: false
    deserialization:
      fail-on-unknown-properties: false
    time-zone: UTC

  # ─── JPA / Hibernate ───────────────────────────────────────────────────────
  jpa:
    open-in-view: false           # Prevent lazy-loading anti-pattern
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
        order_inserts: true
        order_updates: true
        batch_size: 25            # Batch writes for performance

  # ─── Flyway ────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false

  # ─── Servlet / Multipart ───────────────────────────────────────────────────
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# ─── Server ──────────────────────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8081}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 2048
  error:
    include-message: never       # Never expose internal error messages
    include-binding-errors: never
    include-stacktrace: never

# ─── Actuator ────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  cache:
    type: redis

# Sprint 5: AI & Embeddings (Ollama + ChromaDB — no Gemini)
ai:
  ollama:
    base-url: ${AI_OLLAMA_BASE_URL:http://localhost:11434}
    chat-model: ${AI_OLLAMA_CHAT_MODEL:qwen2.5:7b}
    embedding-model: ${AI_OLLAMA_EMBEDDING_MODEL:nomic-embed-text}
  chroma:
    # Default fallback for local dev; Docker sets CHROMA_URL=http://chromadb:8000
    url: ${CHROMA_URL:http://localhost:8000}
  embedding:
    retry-interval-ms: 60000
  debt:
    large-file-threshold: 300
    deep-nesting-threshold: 4
    ai-sample-percentage: 10

  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
  info:
    env:
      enabled: true

# ─── App Custom Properties ───────────────────────────────────────────────────
app:
  version: ${APP_VERSION:1.0.0-SNAPSHOT}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry-minutes: 15
    refresh-token-expiry-days: 7
    access-token-cookie-name: codesage_access
    refresh-token-cookie-name: codesage_refresh
  github:
    client-id: ${GITHUB_CLIENT_ID}
    client-secret: ${GITHUB_CLIENT_SECRET}
    webhook-secret: ${GITHUB_WEBHOOK_SECRET}
  cookie:
    secure: true    # HTTPS only (overridden in dev profile)
    same-site: Lax
    path: /
    domain: ${COOKIE_DOMAIN:}
  encryption:
    key: ${APP_ENCRYPTION_KEY}

# ─── OpenAPI / Springdoc ─────────────────────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
    tags-sorter: alpha
    operations-sorter: method
    try-it-out-enabled: true
  api-docs:
    path: /v3/api-docs
  show-actuator: false

# ─── Logging (base — overridden per profile) ─────────────────────────────────
logging:
  config: classpath:log4j2-spring.xml
