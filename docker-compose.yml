services:

  # PostgreSQL
  postgres:
    image: postgres:17-alpine
    container_name: codesage_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-codesage_db}
      POSTGRES_USER: ${DB_USERNAME:-codesage_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-codesage_dev_pass}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-codesage_user} -d ${DB_NAME:-codesage_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - codesage_network

  # Redis
  redis:
    image: redis:7.4-alpine
    container_name: codesage_redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - codesage_network

  # ChromaDB
  chromadb:
    image: chromadb/chroma:0.5.20
    container_name: codesage_chromadb
    restart: unless-stopped
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
      CHROMA_SERVER_HOST: "0.0.0.0"
    ports:
      - "${CHROMA_PORT:-8000}:8000"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: [ "CMD", "true" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - codesage_network
    # Backend
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile

    container_name: codesage_backend
    restart: unless-stopped

    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRY_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRY_MINUTES:-15}
      JWT_REFRESH_TOKEN_EXPIRY_DAYS: ${JWT_REFRESH_TOKEN_EXPIRY_DAYS:-7}

      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-codesage_db}
      DB_USERNAME: ${DB_USERNAME:-codesage_user}
      DB_PASSWORD: ${DB_PASSWORD:-codesage_dev_pass}

      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""

      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000

      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}

      AI_OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      AI_OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.1:8b}
      AI_OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL:-}
      SERVER_PORT: 8080

    ports:
      - "${SERVER_PORT:-8080}:8080"

    volumes:
      - backend_logs:/app/logs

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy

    healthcheck:
      test: [ "CMD", "true" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

    networks:
      - codesage_network

  # Nginx
  nginx:
    image: nginx:1.27-alpine
    container_name: codesage_nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - codesage_network

  # Ollama
  ollama:
    image: ollama/ollama:latest
    container_name: codesage_ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - codesage_network

networks:
  codesage_network:
    driver: bridge
    name: codesage_network

volumes:
  postgres_data:
    name: codesage_postgres_data

  redis_data:
    name: codesage_redis_data

  chroma_data:
    name: codesage_chroma_data

  backend_logs:
    name: codesage_backend_logs

  ollama_data:
    name: codesage_ollama_data
